aid: abcellera
name: AbCellera
description: >-
  AbCellera (NASDAQ: ABCL) is a Vancouver-based antibody discovery and
  development company that integrates biology, computation, and engineering
  to develop antibody-based medicines. Its technology platform combines
  high-throughput single-cell antibody screening, GPCR and ion-channel
  capabilities, bispecifics, antibody-drug conjugates, structure-based design,
  and AI for sequence and structure analysis. The company operates a hybrid
  business model with a co-development partner network (40+ partners and
  100+ antibody drug programs since 2015) alongside a growing wholly-owned
  pipeline that includes ABCL635 (non-hormonal vasomotor symptoms),
  ABCL575 (atopic dermatitis), ABCL688 (autoimmunity), and ABCL386
  (oncology), plus 20+ discovery programs. AbCellera does not publish a
  public API or developer portal; capabilities are delivered through partner
  collaborations and contract terms.
